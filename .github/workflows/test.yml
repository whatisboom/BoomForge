name: Test

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Clone project
        uses: actions/checkout@v4

      - name: Install Lua
        run: sudo apt-get update && sudo apt-get install -y lua5.4

      - name: Validate manifests
        run: bash scripts/validate-manifests.sh

      - name: Run unit tests
        run: lua5.4 tests/run.lua
